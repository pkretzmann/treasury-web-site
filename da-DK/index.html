<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Værdipapirhandel</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    /* === BRAND:START — auto-genereret af /update-website fra .website/styles.css. Rediger ikke manuelt. === */
    --brand-dark:#1a1a1a; --brand-mid:#c0392b; --brand-light:#d96459;
    --brand-pale:#f7eceb; --brand-subtle:#fafafa; --accent:#c0392b;
    /* === BRAND:END === */
    --white:#FFFFFF; --gray-100:#f6f5f3; --gray-200:#e5e5e5;
    --gray-400:#b3b3b3; --gray-700:#555555; --text:#1a1a1a;
    --sidebar-w:300px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    color:var(--text); background:var(--gray-100);
    display:flex; overflow:hidden;
  }

  /* ── Sidebar ── */
  .sidebar{
    width:var(--sidebar-w); flex:0 0 var(--sidebar-w);
    height:100vh; display:flex; flex-direction:column;
    background:var(--white); border-right:1px solid var(--gray-200);
    transition:margin-left .25s ease;
  }
  .sidebar-header{
    background:linear-gradient(135deg,var(--brand-dark) 0%,var(--brand-mid) 60%,var(--brand-light) 100%);
    color:var(--white); padding:24px 22px 22px; position:relative; overflow:hidden;
  }
  .sidebar-header::after{
    content:''; position:absolute; top:-50px; right:-50px;
    width:160px; height:160px; border-radius:50%; background:rgba(255,255,255,.08);
  }
  .sidebar-header .badge{
    display:inline-block; font-size:11px; font-weight:600; letter-spacing:.06em;
    text-transform:uppercase; padding:4px 10px; border-radius:20px;
    background:rgba(255,255,255,.16); margin-bottom:12px;
  }
  .sidebar-header h1{font-size:20px; font-weight:700; line-height:1.25; position:relative}
  .sidebar-header p{font-size:12.5px; opacity:.85; margin-top:4px; position:relative}

  .search{padding:14px 16px 8px}
  .search input{
    width:100%; padding:9px 12px; font-size:13.5px; font-family:inherit;
    border:1px solid var(--gray-200); border-radius:9px; background:var(--gray-100);
    color:var(--text); outline:none; transition:border-color .15s,background .15s;
  }
  .search input:focus{border-color:var(--brand-light); background:var(--white)}
  .search input::placeholder{color:var(--gray-400)}

  .nav{flex:1; overflow-y:auto; padding:6px 12px 24px}
  .nav-group{margin-top:4px}
  .nav-group-title{
    display:flex; align-items:center; gap:8px; width:100%;
    font-size:11px; font-weight:700; letter-spacing:.07em; text-transform:uppercase;
    color:var(--gray-700); padding:9px 12px; cursor:pointer; user-select:none;
    background:none; border:0; border-radius:8px; font-family:inherit; text-align:left;
    transition:background .12s,color .12s;
  }
  .nav-group-title:hover{background:var(--brand-subtle); color:var(--brand-dark)}
  .nav-group-title .grp-label{flex:1; min-width:0}
  .nav-group-title .chev{flex:0 0 auto; display:flex; color:var(--gray-400); transition:transform .18s ease}
  .nav-group.open>.nav-group-title{color:var(--brand-dark)}
  .nav-group.open>.nav-group-title .chev{transform:rotate(90deg); color:var(--brand-mid)}
  .nav-group-items{display:none; padding-left:6px}
  .nav-group.open>.nav-group-items{display:block}
  .nav.searching .nav-group-items{display:block}
  .nav.searching .nav-group-title .chev{transform:rotate(90deg)}
  .nav a{
    display:block; padding:9px 12px; margin:2px 0; border-radius:8px;
    font-size:13.5px; font-weight:500; color:var(--gray-700);
    text-decoration:none; cursor:pointer; line-height:1.35;
    border-left:3px solid transparent; transition:background .12s,color .12s;
  }
  .nav a:hover{background:var(--brand-subtle); color:var(--brand-dark)}
  .nav a.active{
    background:var(--brand-pale); color:var(--brand-dark);
    border-left-color:var(--brand-light); font-weight:600;
  }
  .nav .empty{padding:14px 12px; font-size:13px; color:var(--gray-400)}

  /* ── Main ── */
  .main{flex:1; display:flex; flex-direction:column; height:100vh; min-width:0}
  .topbar{
    display:flex; align-items:center; gap:12px;
    padding:0 18px; height:54px; flex:0 0 54px;
    background:var(--white); border-bottom:1px solid var(--gray-200);
  }
  .hamburger{
    display:none; background:none; border:none; cursor:pointer;
    padding:6px; border-radius:7px; color:var(--gray-700);
  }
  .hamburger:hover{background:var(--gray-100)}
  .hamburger svg{display:block}
  .crumb{font-size:14px; font-weight:600; color:var(--text); flex:1;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .crumb .grp{color:var(--gray-400); font-weight:500}
  .open-ext{
    display:inline-flex; align-items:center; gap:6px;
    font-size:12.5px; font-weight:600; color:var(--brand-mid);
    text-decoration:none; padding:7px 12px; border-radius:8px;
    border:1px solid var(--gray-200); white-space:nowrap; transition:all .12s;
  }
  .open-ext:hover{background:var(--brand-subtle); border-color:var(--brand-light); color:var(--brand-dark)}

  /* ── Sprogvælger ── */
  .langpick{position:relative}
  .langpick-btn{
    display:inline-flex; align-items:center; gap:6px;
    font-size:12.5px; font-weight:600; color:var(--gray-700);
    background:none; border:1px solid var(--gray-200); border-radius:8px;
    padding:7px 10px; cursor:pointer; font-family:inherit; transition:all .12s;
  }
  .langpick-btn:hover{background:var(--brand-subtle); border-color:var(--brand-light); color:var(--brand-dark)}
  .langpick-btn svg{display:block}
  .langpick-menu{
    display:none; position:absolute; top:calc(100% + 6px); right:0; z-index:20;
    min-width:160px; padding:6px; background:var(--white);
    border:1px solid var(--gray-200); border-radius:10px; box-shadow:0 8px 28px rgba(10,25,40,.16);
  }
  .langpick.open .langpick-menu{display:block}
  .langpick-menu button{
    display:flex; align-items:center; gap:8px; width:100%; text-align:left;
    padding:8px 10px; border:0; border-radius:7px; background:none; cursor:pointer;
    font-family:inherit; font-size:13px; color:var(--gray-700); transition:background .12s,color .12s;
  }
  .langpick-menu button:hover{background:var(--brand-subtle); color:var(--brand-dark)}
  .langpick-menu button.current{background:var(--brand-pale); color:var(--brand-dark); font-weight:600}

  .frame-wrap{flex:1; min-height:0; background:var(--gray-100)}
  iframe{width:100%; height:100%; border:0; display:block; background:var(--white)}

  .scrim{
    display:none; position:fixed; inset:0; background:rgba(10,25,40,.45); z-index:5;
  }

  @media (max-width:860px){
    .sidebar{position:fixed; z-index:10; box-shadow:0 0 40px rgba(0,0,0,.18); margin-left:calc(-1 * var(--sidebar-w))}
    body.nav-open .sidebar{margin-left:0}
    body.nav-open .scrim{display:block}
    .hamburger{display:inline-flex}
  }
/* Editorial theme — serif display headings */
header h1, h2, h3, h4, .stat-card .stat-num, .feature-card h3, .entity-card .entity-name { font-family: Georgia, 'Times New Roman', serif; letter-spacing: -0.01em; }
</style>
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="badge">Business Central</span>
      <h1>Værdipapirhandel</h1>
      <p>Brugervejledninger &amp; tekniske noter</p>
    </div>
    <div class="search">
      <input type="search" id="search" placeholder="Søg i sider…" autocomplete="off" />
    </div>
    <nav class="nav" id="nav"></nav>
  </aside>

  <div class="scrim" id="scrim"></div>

  <div class="main">
    <div class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Vis/skjul menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div class="crumb" id="crumb">Vælg en side</div>
      <div class="langpick" id="langpick" hidden>
        <button class="langpick-btn" id="langpickBtn" aria-haspopup="true" aria-expanded="false" aria-label="Skift sprog" title="Skift sprog">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          <span id="langpickCur"></span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="langpick-menu" id="langpickMenu" role="menu"></div>
      </div>
      <a class="open-ext" id="openExt" href="#" target="_blank" rel="noopener" title="Åbn siden i ny fane">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14 21 3"/></svg>
        Åbn i ny fane
      </a>
    </div>
    <div class="frame-wrap">
      <iframe id="frame" title="Dokumentation" referrerpolicy="no-referrer"></iframe>
    </div>
  </div>

<script>
/* ──────────────────────────────────────────────
   Navigation. NAV-listen genereres af /update-website
   ud fra HTML-filerne i .website/. Rediger ikke
   indholdet mellem NAV:START og NAV:END manuelt —
   kør /update-website igen i stedet.
   path = relativ sti fra denne index.html.
─────────────────────────────────────────────── */
const NAV = [
  // === NAV:START — auto-genereret af /update-website. Rediger ikke manuelt. ===
  { group: "1. Introduktion", items: [
    { title: "Design", path: "1. Introduktion/1.1 Design.html" },
    { title: "De fem kladdetyper", path: "1. Introduktion/1.2 De fem kladdetyper.html" },
    { title: "Posteringer i modulet", path: "1. Introduktion/1.3 Posteringer i modulet.html" },
  ]},
  { group: "2. Stamdata", items: [
    { title: "Oprettelse af aktier", path: "2. Stamdata/2.1 Oprettelse af aktier.html" },
    { title: "Oprettelse af obligationer", path: "2. Stamdata/2.2 Oprettelse af obligationer.html" },
  ]},
  { group: "3. Handel", items: [
    { title: "Aktiekøb", path: "3. Handel/3.1 Aktiekøb.html" },
    { title: "Aktiesalg", path: "3. Handel/3.2 Aktiesalg.html" },
    { title: "Obligationskøb", path: "3. Handel/3.3 Obligationskøb.html" },
    { title: "Obligationssalg", path: "3. Handel/3.4 Obligationssalg.html" },
  ]},
  { group: "4. Opfølgning", items: [
    { title: "Ompostering", path: "4. Opfølgning/4.1 Ompostering.html" },
    { title: "Værdipapirstatistik", path: "4. Opfølgning/4.2 Værdipapirstatistik.html" },
    { title: "Værdipapirposter og analyse", path: "4. Opfølgning/4.3 Værdipapirposter og analyse.html" },
  ]},
  { group: "5. Periodiske aktiviteter", items: [
    { title: "Aktieudbytte", path: "5. Periodiske aktiviteter/5.1 Aktieudbytte.html" },
    { title: "Fondskursregulering", path: "5. Periodiske aktiviteter/5.2 Fondskursregulering.html" },
    { title: "Beregning af obligationsrente", path: "5. Periodiske aktiviteter/5.3 Beregning af obligationsrente.html" },
    { title: "Overførsel af værdipapirværdier", path: "5. Periodiske aktiviteter/5.4 Overførsel af værdipapirværdier.html" },
    { title: "Likviditetssimulering", path: "5. Periodiske aktiviteter/5.5 Likviditetssimulering.html" },
  ]},
  { group: "6. Opsætning af Treasury", items: [
    { title: "Opsætning af værdipapirer", path: "6. Opsætning af Treasury/6.1 Opsætning af værdipapirer.html" },
    { title: "Oprettelse af bogføringsgrupper", path: "6. Opsætning af Treasury/6.2 Oprettelse af bogføringsgrupper.html" },
    { title: "Oprettelse af depoter", path: "6. Opsætning af Treasury/6.3 Oprettelse af depoter.html" },
    { title: "Oprettelse af udstedere", path: "6. Opsætning af Treasury/6.4 Oprettelse af udstedere.html" },
    { title: "Oprettelse af kurser", path: "6. Opsætning af Treasury/6.5 Oprettelse af kurser.html" },
    { title: "Oprettelse af ekstra informationer", path: "6. Opsætning af Treasury/6.6 Oprettelse af ekstra informationer.html" },
    { title: "Oprettelse af kladdetyper", path: "6. Opsætning af Treasury/6.7 Oprettelse af kladdetyper.html" },
    { title: "Oprettelse af obligationsterminer", path: "6. Opsætning af Treasury/6.8 Oprettelse af obligationsterminer.html" },
  ]},
  { group: "7. Testscenarier", items: [
    { title: "Oversigt og opsætning", path: "7. Testscenarier/7.1 Oversigt og opsætning.html" },
    { title: "Køb og kursregulering", path: "7. Testscenarier/7.2 Køb og kursregulering.html" },
    { title: "Udbytte og salg", path: "7. Testscenarier/7.3 Udbytte og salg.html" },
    { title: "Overførsel og stykstørrelse", path: "7. Testscenarier/7.4 Overførsel og stykstørrelse.html" },
    { title: "Korrektion og tilbageførsel", path: "7. Testscenarier/7.5 Korrektion og tilbageførsel.html" },
  ]},
  // === NAV:END ===
];

/* Tilgængelige sprog. Udfyldes af /update-website ud fra sprogmapperne i .website/.
   Rediger ikke indholdet mellem LOCALES:START og LOCALES:END manuelt. */
const LOCALES = [
  // === LOCALES:START — auto-genereret af /update-website. Rediger ikke manuelt. ===
  "da-DK",
  // === LOCALES:END ===
];

const navEl   = document.getElementById('nav');
const frame   = document.getElementById('frame');
const crumb   = document.getElementById('crumb');
const openExt = document.getElementById('openExt');
const search  = document.getElementById('search');
const body    = document.body;

const flat = [];
NAV.forEach(g => g.items.forEach(it => flat.push({ ...it, group: g.group })));

/* Build sidebar */
NAV.forEach(g => {
  const grp = document.createElement('div');
  grp.className = 'nav-group';
  grp.dataset.group = g.group;
  const t = document.createElement('button');
  t.type = 'button';
  t.className = 'nav-group-title';
  t.setAttribute('aria-expanded', 'false');
  const label = document.createElement('span');
  label.className = 'grp-label';
  label.textContent = g.group;
  const chev = document.createElement('span');
  chev.className = 'chev';
  chev.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>';
  t.appendChild(label);
  t.appendChild(chev);
  grp.appendChild(t);
  const itemsWrap = document.createElement('div');
  itemsWrap.className = 'nav-group-items';
  g.items.forEach(it => {
    const a = document.createElement('a');
    a.textContent = it.title;
    a.dataset.path = it.path;
    a.dataset.search = (g.group + ' ' + it.title).toLowerCase();
    a.href = '#' + encodeURIComponent(it.path);
    itemsWrap.appendChild(a);
  });
  grp.appendChild(itemsWrap);
  t.addEventListener('click', () => {
    const open = grp.classList.toggle('open');
    t.setAttribute('aria-expanded', open ? 'true' : 'false');
  });
  navEl.appendChild(grp);
});
const emptyMsg = document.createElement('div');
emptyMsg.className = 'empty';
emptyMsg.textContent = 'Ingen sider matcher søgningen.';
emptyMsg.style.display = 'none';
navEl.appendChild(emptyMsg);

/* Routing */
function show(path, push) {
  const entry = flat.find(f => f.path === path) || flat[0];
  if (!entry) return;
  frame.src = encodeURI(entry.path);
  crumb.innerHTML = '<span class="grp">' + esc(entry.group) + '</span> &nbsp;›&nbsp; ' + esc(entry.title);
  openExt.href = encodeURI(entry.path);
  document.title = entry.title + ' · Værdipapirhandel';
  navEl.querySelectorAll('a').forEach(a =>
    a.classList.toggle('active', a.dataset.path === entry.path));
  // open the accordion group that holds the active page
  const activeLink = navEl.querySelector('a.active');
  if (activeLink) {
    const ag = activeLink.closest('.nav-group');
    if (ag) {
      ag.classList.add('open');
      const bt = ag.querySelector('.nav-group-title');
      if (bt) bt.setAttribute('aria-expanded', 'true');
    }
  }
  if (push && location.hash.slice(1) !== encodeURIComponent(entry.path))
    location.hash = encodeURIComponent(entry.path);
  if (body.classList.contains('nav-open')) closeNav();
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function routeFromHash() {
  const h = decodeURIComponent(location.hash.slice(1));
  show(flat.some(f => f.path === h) ? h : (flat[0] && flat[0].path), false);
}
window.addEventListener('hashchange', routeFromHash);

navEl.addEventListener('click', e => {
  const a = e.target.closest('a[data-path]');
  if (!a) return;
  e.preventDefault();
  show(a.dataset.path, true);
});

/* ── Fuldtekst-indeks ──
   Bygges dovent via fetch af hver side. Virker når dokumentationen serveres
   over http(s) fra samme origin (fx GitHub Pages). Under file:// blokeres
   fetch — da falder søgningen automatisk tilbage til kun sidetitler. */
let contentIndex = null;   // { path: "tekst i små bogstaver" | null }
let indexPromise = null;   // igangværende build
let building = false;

function buildIndex() {
  if (indexPromise) return indexPromise;
  building = true;
  indexPromise = Promise.all(flat.map(entry =>
    fetch(encodeURI(entry.path))
      .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(html => {
        const doc = new DOMParser().parseFromString(html, 'text/html');
        doc.querySelectorAll('script,style').forEach(n => n.remove());
        const text = (doc.body ? doc.body.textContent : '').replace(/\s+/g, ' ').toLowerCase();
        return { path: entry.path, text };
      })
      .catch(() => ({ path: entry.path, text: null }))   // enkelt-side fejl → ingen indholdssøgning for den
  )).then(results => {
    contentIndex = {};
    results.forEach(r => { contentIndex[r.path] = r.text; });
    building = false;
    return contentIndex;
  });
  return indexPromise;
}

function applyFilter(q) {
  navEl.classList.toggle('searching', !!q);
  let visible = 0;
  navEl.querySelectorAll('.nav-group').forEach(grp => {
    let groupHits = 0;
    grp.querySelectorAll('a').forEach(a => {
      const inTitle = !q || a.dataset.search.includes(q);
      const txt = q && contentIndex ? contentIndex[a.dataset.path] : null;
      const inContent = txt ? txt.includes(q) : false;
      const hit = inTitle || inContent;
      a.style.display = hit ? '' : 'none';
      if (hit) groupHits++;
    });
    grp.style.display = groupHits ? '' : 'none';
    visible += groupHits;
  });
  if (visible) {
    emptyMsg.style.display = 'none';
  } else {
    emptyMsg.textContent = (q && building)
      ? 'Søger i sideindhold…'
      : 'Ingen sider matcher søgningen.';
    emptyMsg.style.display = 'block';
  }
}

/* Search filter */
search.addEventListener('input', () => {
  const q = search.value.trim().toLowerCase();
  applyFilter(q);
  if (q && !contentIndex) {
    buildIndex().then(() => applyFilter(search.value.trim().toLowerCase()));
  }
});

/* Forhåndsbyg indekset når browseren er idle, så første søgning er hurtig */
if ('requestIdleCallback' in window) requestIdleCallback(() => buildIndex());
else setTimeout(buildIndex, 1500);

/* Mobile nav toggle */
const scrim = document.getElementById('scrim');
function openNav(){ body.classList.add('nav-open'); }
function closeNav(){ body.classList.remove('nav-open'); }
document.getElementById('hamburger').addEventListener('click', () =>
  body.classList.toggle('nav-open'));
scrim.addEventListener('click', closeNav);

/* ── Sprogvælger ── */
(function () {
  var wrap = document.getElementById('langpick');
  if (!wrap || !Array.isArray(LOCALES) || LOCALES.length < 2) return;  // skjul ved 0-1 sprog
  var btn = document.getElementById('langpickBtn');
  var cur = document.getElementById('langpickCur');
  var menu = document.getElementById('langpickMenu');

  // Aktuelt sprog = mappenavnet portalen ligger i (…/<sprog>/index.html)
  var segs = location.pathname.replace(/\/index\.html?$/i, '').split('/').filter(Boolean);
  var current = segs.length ? segs[segs.length - 1] : '';

  function label(code) {
    try {
      var dn = new Intl.DisplayNames([code], { type: 'language' });
      var s = dn.of(code.split('-')[0]);
      return s ? s.charAt(0).toUpperCase() + s.slice(1) : code;
    } catch (e) { return code; }
  }

  cur.textContent = label(current) || current || 'Sprog';
  LOCALES.forEach(function (code) {
    var b = document.createElement('button');
    b.type = 'button'; b.setAttribute('role', 'menuitem');
    b.textContent = label(code);
    if (code === current) b.className = 'current';
    b.addEventListener('click', function () {
      try { localStorage.setItem('docs.locale', code); } catch (e) {}
      location.href = '../' + code + '/index.html';
    });
    menu.appendChild(b);
  });

  function close() { wrap.classList.remove('open'); btn.setAttribute('aria-expanded', 'false'); }
  btn.addEventListener('click', function (e) {
    e.stopPropagation();
    var open = wrap.classList.toggle('open');
    btn.setAttribute('aria-expanded', open ? 'true' : 'false');
  });
  document.addEventListener('click', close);
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') close(); });
  menu.addEventListener('click', function (e) { e.stopPropagation(); });

  wrap.hidden = false;
})();

/* Init */
routeFromHash();
</script>
